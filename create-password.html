<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAN — Opprett passord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        padding: 2rem 1.25rem;
        background: #080810;
        position: relative; overflow: hidden;
      }

      .bg-video-wrap { position: fixed; inset: 0; z-index: 0; }
      .bg-video-wrap video {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0; transition: opacity 1.4s ease-in-out; transform: scale(1.05);
      }
      .bg-video-wrap video.active { opacity: 1; }
      .bg-overlay {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background:
          radial-gradient(ellipse 55% 65% at 50% 50%, rgba(8,8,18,0.75) 0%, rgba(8,8,18,0.55) 60%, rgba(8,8,18,0.35) 100%),
          linear-gradient(180deg, rgba(8,8,18,0.5) 0%, rgba(8,8,18,0.6) 100%);
      }

      .card {
        position: relative; z-index: 2;
        width: min(420px, 100%);
        background: rgba(12,12,22,0.82);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 1.75rem; padding: 2rem 2.5rem;
        backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 100px rgba(0,0,0,0.65);
        animation: rise 0.65s cubic-bezier(0.22,1,0.36,1) both;
      }
      @keyframes rise { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
      .card::before {
        content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140,100,255,0.55), transparent);
      }

      .brand { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 1.75rem; }
      .brand-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
        box-shadow: 0 0 10px rgba(167,139,250,0.55);
      }
      .brand-label { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

      h1 { font-size: 1.85rem; font-weight: 700; color: #fff; letter-spacing: -0.025em; margin-bottom: 0.5rem; }
      .subtitle { font-size: 0.88rem; color: rgba(255,255,255,0.38); margin-bottom: 1.75rem; line-height: 1.6; }
      .divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 1.75rem; }

      .field { margin-bottom: 1rem; }
      label {
        display: block; font-size: 0.74rem; font-weight: 600;
        letter-spacing: 0.09em; text-transform: uppercase;
        color: rgba(255,255,255,0.38); margin-bottom: 0.5rem;
      }
      input {
        width: 100%; padding: 0.82rem 1.1rem;
        font-size: 0.95rem; font-family: inherit;
        background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 0.9rem; color: #fff; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }
      input::placeholder { color: rgba(255,255,255,0.18); }
      input:focus {
        border-color: rgba(167,139,250,0.55);
        background: rgba(167,139,250,0.05);
        box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
      }
      input.error {
        border-color: rgba(248,113,113,0.7);
        background: rgba(248,113,113,0.05);
        box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
      }
      .error-msg { display: none; margin-top: 0.35rem; font-size: 0.75rem; color: rgba(248,113,113,0.9); letter-spacing: 0.01em; }
      .error-msg.visible { display: block; }

      button {
        width: 100%; padding: 0.9rem;
        font-size: 0.95rem; font-family: inherit; font-weight: 600;
        border: none; border-radius: 0.9rem; cursor: pointer;
        background: linear-gradient(135deg, #7c5cfc, #a78bfa); color: #fff;
        transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
        box-shadow: 0 4px 20px rgba(124,92,252,0.35);
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(124,92,252,0.48); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
  </head>
  <body>
    <div class="bg-video-wrap" id="bgWrap">
      <video class="active" src="video-1.mp4" muted playsinline preload="auto"></video>
      <video src="video-2.mp4" muted playsinline preload="auto"></video>
      <video src="video-3.mp4" muted playsinline preload="auto"></video>
      <video src="video-4.mp4" muted playsinline preload="auto"></video>
    </div>
    <div class="bg-overlay"></div>

    <main class="card">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">UAN COMMUNITY</span>
      </div>

      <h1>Opprett ditt passord.</h1>
      <p class="subtitle">Velkommen! Opprett et passord for å fullføre kontoen. Du bruker det neste gang du logger inn.</p>
      <div class="divider"></div>

      <form id="passwordForm" novalidate>
        <div class="field">
          <label for="password">Passord</label>
          <input type="password" id="password" placeholder="Minst 8 tegn" autocomplete="new-password" />
          <span class="error-msg" id="err-password">Passordet må ha minst 8 tegn.</span>
        </div>
        <div class="field">
          <label for="passwordConfirm">Bekreft passord</label>
          <input type="password" id="passwordConfirm" placeholder="Skriv passordet på nytt" autocomplete="new-password" />
          <span class="error-msg" id="err-passwordConfirm">Passordene matcher ikke.</span>
        </div>
        <button type="submit" id="passwordBtn">Lagre passord og fortsett</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/brim.js"></script>
    <script>
      // Video montage
      (function () {
        const videos = Array.from(document.getElementById('bgWrap').querySelectorAll('video'));
        let current = 0;
        videos.forEach(v => { v.loop = true; v.play().catch(() => {}); });
        setInterval(() => {
          const prev = current;
          current = (current + 1) % videos.length;
          videos[current].classList.add('active');
          setTimeout(() => videos[prev].classList.remove('active'), 1400);
        }, 5500);
      })();

      // Check if user is authenticated
      getSession().then(s => { if (!s) window.location.href = 'index.html'; });

      // Clear errors on input
      ['password','passwordConfirm'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
          document.getElementById(id).classList.remove('error');
          document.getElementById('err-' + id).classList.remove('visible');
        });
      });

      // Submit handler
      document.getElementById('passwordForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const password       = document.getElementById('password').value;
        const passwordConf   = document.getElementById('passwordConfirm').value;

        const passwordInvalid = !password || password.length < 8;
        const passwordMismatch = password !== passwordConf;

        document.getElementById('password').classList.toggle('error', passwordInvalid);
        document.getElementById('err-password').classList.toggle('visible', passwordInvalid);
        document.getElementById('passwordConfirm').classList.toggle('error', !passwordInvalid && passwordMismatch);
        document.getElementById('err-passwordConfirm').classList.toggle('visible', !passwordInvalid && passwordMismatch);

        if (passwordInvalid || passwordMismatch) return;

        const btn = document.getElementById('passwordBtn');
        btn.disabled = true; btn.textContent = 'Lagrer…';

        const { error } = await db.auth.updateUser({ password });

        if (error) {
          alert('Kunne ikke sette passord: ' + error.message);
          btn.disabled = false; btn.textContent = 'Lagre passord og fortsett';
          return;
        }

        const session = await getSession();
        if (!session) {
          window.location.href = 'login.html';
          return;
        }

        window.location.href = 'dashboard.html';
      });
    </script>
  </body>
</html>
