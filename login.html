<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAN — Logg inn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background: #080810;
        position: relative;
        overflow: hidden;
      }

      .bg-video-wrap { position: fixed; inset: 0; z-index: 0; }
      .bg-video-wrap video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover; opacity: 0;
        transition: opacity 1.4s ease-in-out;
        transform: scale(1.05);
      }
      .bg-video-wrap video.active { opacity: 1; }

      .bg-overlay {
        position: fixed; inset: 0; z-index: 1; pointer-events: none;
        background:
          radial-gradient(ellipse 55% 65% at 50% 50%, rgba(8,8,18,0.75) 0%, rgba(8,8,18,0.55) 60%, rgba(8,8,18,0.35) 100%),
          linear-gradient(180deg, rgba(8,8,18,0.5) 0%, rgba(8,8,18,0.6) 100%);
      }

      .card {
        position: relative; z-index: 2;
        width: min(420px, 100%);
        background: rgba(12,12,22,0.82);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 1.75rem;
        padding: 3rem 2.75rem;
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 40px 100px rgba(0,0,0,0.65);
        animation: rise 0.65s cubic-bezier(0.22,1,0.36,1) both;
      }
      @keyframes rise { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }

      .card::before {
        content: ''; position: absolute;
        top: 0; left: 15%; right: 15%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140,100,255,0.55), transparent);
      }

      .brand { display: flex; align-items: center; gap: 0.55rem; margin-bottom: 2.25rem; }
      .brand-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
        box-shadow: 0 0 10px rgba(167,139,250,0.55);
      }
      .brand-label {
        font-size: 0.78rem; font-weight: 600;
        letter-spacing: 0.18em; text-transform: uppercase;
        color: rgba(255,255,255,0.45);
      }

      h1 { font-size: 1.85rem; font-weight: 700; color: #fff; letter-spacing: -0.025em; margin-bottom: 0.5rem; }
      .subtitle { font-size: 0.88rem; color: rgba(255,255,255,0.38); margin-bottom: 2rem; line-height: 1.6; }
      .divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 2rem; }

      .field { margin-bottom: 1.2rem; }
      label {
        display: block; font-size: 0.74rem; font-weight: 600;
        letter-spacing: 0.09em; text-transform: uppercase;
        color: rgba(255,255,255,0.38); margin-bottom: 0.5rem;
      }
      input {
        width: 100%; padding: 0.82rem 1.1rem;
        font-size: 0.95rem; font-family: inherit;
        background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 0.9rem; color: #fff; outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }
      input::placeholder { color: rgba(255,255,255,0.18); }
      input:focus {
        border-color: rgba(167,139,250,0.55);
        background: rgba(167,139,250,0.05);
        box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
      }
      input.error { border-color: rgba(248,113,113,0.7); box-shadow: 0 0 0 3px rgba(248,113,113,0.1); }
      .error-msg { display: none; margin-top: 0.35rem; font-size: 0.75rem; color: rgba(248,113,113,0.9); }
      .error-msg.visible { display: block; }

      button {
        margin-top: 0.5rem; width: 100%; padding: 0.9rem;
        font-size: 0.95rem; font-family: inherit; font-weight: 600;
        border: none; border-radius: 0.9rem; cursor: pointer;
        background: linear-gradient(135deg, #7c5cfc, #a78bfa);
        color: #fff; transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
        box-shadow: 0 4px 20px rgba(124,92,252,0.35);
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(124,92,252,0.48); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

      .footer-note { text-align: center; margin-top: 1.6rem; font-size: 0.78rem; color: rgba(255,255,255,0.25); }
      .footer-note a { color: rgba(167,139,250,0.8); text-decoration: none; }
      .footer-note a:hover { color: #a78bfa; }
    </style>
  </head>
  <body>
    <div class="bg-video-wrap" id="bgWrap">
      <video class="active" src="Video.png/video-1.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-2.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-3.mp4" muted playsinline preload="auto"></video>
      <video src="Video.png/video-4.mp4" muted playsinline preload="auto"></video>
    </div>
    <div class="bg-overlay"></div>

    <main class="card">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">UAN COMMUNITY</span>
      </div>

      <h1>Logg inn</h1>
      <p class="subtitle">Skriv inn e-postadressen din for å motta en innloggingslenke.</p>
      <div class="divider"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-postadresse</label>
          <input type="email" id="email" placeholder="din@epost.no" autocomplete="email" />
          <span class="error-msg" id="err-email">Oppgi en gyldig e-postadresse.</span>
        </div>
        <button type="submit">Send innloggingslenke</button>
      </form>

      <p class="footer-note">Ikke medlem ennå? <a href="index.html">Bli medlem</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/brim.js"></script>
    <script>
      // Video montage
      (function () {
        const videos = Array.from(document.getElementById('bgWrap').querySelectorAll('video'));
        let current = 0;
        videos.forEach(v => { v.loop = true; v.play().catch(() => {}); });
        setInterval(() => {
          const prev = current;
          current = (current + 1) % videos.length;
          videos[current].classList.add('active');
          setTimeout(() => videos[prev].classList.remove('active'), 1400);
        }, 5500);
      })();

      // Redirect if already logged in
      getSession().then(s => { if (s) window.location.href = 'dashboard.html'; });

      document.getElementById('email').addEventListener('input', () => {
        document.getElementById('email').classList.remove('error');
        document.getElementById('err-email').classList.remove('visible');
      });

      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email   = document.getElementById('email').value.trim();
        const emailEl = document.getElementById('email');
        const errEl   = document.getElementById('err-email');
        const invalid = !email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        emailEl.classList.toggle('error', invalid);
        errEl.classList.toggle('visible', invalid);
        if (invalid) return;

        const btn = this.querySelector('button');
        btn.disabled = true; btn.textContent = 'Sender…';

        const redirectTo = window.location.origin
          + window.location.pathname.replace(/\/[^/]*$/, '/')
          + 'auth-callback.html';

        const { error } = await db.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: redirectTo }
        });

        if (error) {
          alert('Feil: ' + error.message);
          btn.disabled = false; btn.textContent = 'Send innloggingslenke';
          return;
        }

        window.location.href = 'check-email.html?email=' + encodeURIComponent(email);
      });
    </script>
  </body>
</html>
