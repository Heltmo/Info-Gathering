<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brim — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem;
        background: #0d0e1a;
        position: relative;
        overflow: hidden;
      }

      /* ── VIDEO BACKGROUND ─────────────────────────────── */
      .bg-video-wrap {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .bg-video-wrap video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1.4s ease-in-out;
        /* slight scale for a slow-zoom Ken Burns feel */
        transform: scale(1.05);
      }

      .bg-video-wrap video.active {
        opacity: 1;
      }

      /* Dark overlay — keeps card readable, edges slightly lighter */
      .bg-overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(ellipse 55% 65% at 50% 50%,
            rgba(8, 8, 18, 0.72) 0%,
            rgba(8, 8, 18, 0.52) 60%,
            rgba(8, 8, 18, 0.35) 100%),
          linear-gradient(180deg, rgba(8,8,18,0.45) 0%, rgba(8,8,18,0.55) 100%);
        pointer-events: none;
      }

      /* ── CARD ─────────────────────────────────────────── */
      .card {
        position: relative;
        z-index: 2;
        width: min(460px, 100%);
        background: rgba(12, 12, 22, 0.80);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 1.75rem;
        padding: 3rem 2.75rem;
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.03),
          0 40px 100px rgba(0,0,0,0.65),
          0 0 80px rgba(100,70,200,0.08);
        animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 15%; right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(140, 100, 255, 0.55), transparent);
      }

      /* ── BRAND ────────────────────────────────────────── */
      .brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        margin-bottom: 2.25rem;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, #a78bfa, #c4b5fd);
        box-shadow: 0 0 10px rgba(167, 139, 250, 0.55);
      }

      .brand-label {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
      }

      /* ── TYPOGRAPHY ───────────────────────────────────── */
      h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.025em;
        line-height: 1.15;
        margin-bottom: 0.55rem;
      }

      .subtitle {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.38);
        margin-bottom: 2.25rem;
        font-weight: 400;
        line-height: 1.6;
      }

      .divider {
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin-bottom: 2.25rem;
      }

      /* ── FORM ─────────────────────────────────────────── */
      .field { margin-bottom: 1.2rem; }

      label {
        display: block;
        font-size: 0.74rem;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.38);
        margin-bottom: 0.5rem;
      }

      input {
        width: 100%;
        padding: 0.82rem 1.1rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 0.9rem;
        color: #fff;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      }

      input::placeholder { color: rgba(255,255,255,0.18); }

      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.5;
        cursor: pointer;
      }

      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        opacity: 0.9;
      }

      input:focus {
        border-color: rgba(167,139,250,0.55);
        background: rgba(167,139,250,0.05);
        box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
      }

      /* ── CHECKBOX ─────────────────────────────────────── */
      .check-field {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 1.4rem;
        margin-top: 0.4rem;
      }

      .check-field input[type="checkbox"] {
        width: 18px;
        min-width: 18px;
        height: 18px;
        padding: 0;
        margin-top: 2px;
        border-radius: 5px;
        background: rgba(255,255,255,0.045);
        border: 1px solid rgba(255,255,255,0.18);
        cursor: pointer;
        accent-color: #7c5cfc;
      }

      .check-field label {
        text-transform: none;
        letter-spacing: 0;
        font-size: 0.84rem;
        font-weight: 400;
        color: rgba(255,255,255,0.52);
        line-height: 1.5;
        cursor: pointer;
      }

      button {
        margin-top: 0.5rem;
        width: 100%;
        padding: 0.9rem;
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 600;
        letter-spacing: 0.02em;
        border: none;
        border-radius: 0.9rem;
        cursor: pointer;
        background: linear-gradient(135deg, #7c5cfc 0%, #a78bfa 100%);
        color: #fff;
        transition: transform 0.15s, box-shadow 0.2s, opacity 0.15s;
        box-shadow: 0 4px 20px rgba(124, 92, 252, 0.35);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 28px rgba(124, 92, 252, 0.48);
        opacity: 0.95;
      }

      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 10px rgba(124, 92, 252, 0.25);
      }

      .footer-note {
        text-align: center;
        margin-top: 1.6rem;
        font-size: 0.72rem;
        color: rgba(255,255,255,0.18);
        letter-spacing: 0.02em;
      }

      /* ── COUNTER / PROGRESS ────────────────────────────── */
      .counter-section {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255,255,255,0.06);
      }

      .counter-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 0.7rem;
      }

      .counter-label {
        font-size: 0.74rem;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.32);
      }

      .counter-numbers {
        font-size: 0.88rem;
        font-weight: 600;
        color: rgba(255,255,255,0.55);
      }

      .counter-numbers span {
        color: #a78bfa;
      }

      .progress-track {
        height: 5px;
        background: rgba(255,255,255,0.07);
        border-radius: 99px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7c5cfc, #a78bfa);
        border-radius: 99px;
        transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
      }
    </style>
  </head>
  <body>

    <!-- ── BACKGROUND VIDEO MONTAGE ──────────────────────── -->
    <!--
      Replace the src attributes below with your own video files.
      Recommended clips (4–6 seconds each, no sound needed):
        video-1 → folk som spiller fotball (energi, glede, samspill)
        video-2 → tur i skogen (ro, natur, frihet, samhold)
        video-3 → folk som drikker te sammen (varme, nærhet, samtale)
        video-4 → valgfritt fellesskapsøyeblikk (avsluttende stemning)

      Tips: MP4 under 5 MB per klipp gir rask lastetid.
      Tool: https://www.freeconvert.com/video-compressor
    -->
    <div class="bg-video-wrap" id="bgWrap">
      <video class="active" src="video-1.mp4" muted playsinline preload="auto"></video>
      <video             src="video-2.mp4" muted playsinline preload="auto"></video>
      <video             src="video-3.mp4" muted playsinline preload="auto"></video>
      <video             src="video-4.mp4" muted playsinline preload="auto"></video>
    </div>
    <div class="bg-overlay"></div>

    <!-- ── FORM CARD ──────────────────────────────────────── -->
    <main class="card">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">Brim Community</span>
      </div>

      <h1>Velkommen inn i fellesskapet.</h1>
      <p class="subtitle">Et varmt og levende fellesskap for deg som vil skape flere minner og nye forbindelser.</p>
      <div class="divider"></div>

      <form id="regForm" novalidate>
        <!-- Fullt navn -->
        <div class="field">
          <label for="fullName">Fullt navn</label>
          <input type="text" id="fullName" name="navn" placeholder="Ditt fulle navn" autocomplete="name" required />
        </div>

        <!-- Telefonnummer -->
        <div class="field">
          <label for="phoneNumber">Telefonnummer</label>
          <input type="tel" id="phoneNumber" name="telefon" placeholder="+47 000 00 000" autocomplete="tel" required />
        </div>

        <!-- E-postadresse -->
        <div class="field">
          <label for="email">E-postadresse</label>
          <input type="email" id="email" name="e_post" placeholder="din@epost.no" autocomplete="email" />
        </div>

        <!-- Fødselsdato -->
        <div class="field">
          <label for="birthdate">Fødselsdato</label>
          <input type="date" id="birthdate" name="birthdate" required />
        </div>

        <!-- Kommune -->
        <div class="field">
          <label for="kommune">Kommune</label>
          <input type="text" id="kommune" name="kommune" placeholder="F.eks. Oslo" required />
        </div>

        <!-- Bekreftelse -->
        <div class="check-field">
          <input type="checkbox" id="bekreft" name="ønsker_medlemskap" required />
          <label for="bekreft">Jeg bekrefter at jeg ønsker å bli medlem</label>
        </div>

        <button type="submit">Bli medlem</button>
      </form>

      <!-- ── COUNTER ──────────────────────────────────────── -->
      <div class="counter-section">
        <div class="counter-header">
          <span class="counter-label">Medlemmer</span>
          <span class="counter-numbers"><span id="countNum">–</span> / 200</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <p class="footer-note">© 2026 Brim Community — All rights reserved.</p>
    </main>

    <!-- Supabase JS client (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
      const GOAL = 200;

      /* ── SUPABASE CLIENT ───────────────────────────────── */
      const { createClient } = supabase;
      const db = createClient(
        'https://ytwicopssgskffjmolmu.supabase.co',
        'sb_publishable_ONwJ-AHc8RGSvphR-9GaEA_AMQONxAC'
      );

      /* ── VIDEO MONTAGE ─────────────────────────────────── */
      (function () {
        const wrap    = document.getElementById('bgWrap');
        const videos  = Array.from(wrap.querySelectorAll('video'));
        const HOLD    = 5500;
        const FADE    = 1400;
        let   current = 0;

        videos.forEach(v => { v.loop = true; v.play().catch(() => {}); });

        function next() {
          const prev = current;
          current    = (current + 1) % videos.length;
          videos[current].classList.add('active');
          setTimeout(() => videos[prev].classList.remove('active'), FADE);
        }

        setInterval(next, HOLD);
      })();

      /* ── COUNTER ───────────────────────────────────────── */
      function setCounter(antall) {
        document.getElementById('countNum').textContent = antall;
        const pct = Math.min((antall / GOAL) * 100, 100);
        document.getElementById('progressFill').style.width = pct + '%';
      }

      async function fetchCount() {
        const { count, error } = await db
          .from('members')
          .select('*', { count: 'exact', head: true });

        if (!error) setCounter(count);
      }

      fetchCount();

      /* ── FORM SUBMIT ───────────────────────────────────── */
      document.getElementById('regForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const name         = document.getElementById('fullName').value.trim();
        const phone        = document.getElementById('phoneNumber').value.trim();
        const birthdate    = document.getElementById('birthdate').value;
        const municipality = document.getElementById('kommune').value.trim();
        const bekreft      = document.getElementById('bekreft').checked;

        if (!name || !phone || !birthdate || !municipality || !bekreft) {
          alert('Vennligst fyll ut alle obligatoriske felt og bekreft medlemskap.');
          return;
        }

        const btn = this.querySelector('button[type="submit"]');
        btn.disabled    = true;
        btn.textContent = 'Sender…';

        const { error } = await db.from('members').insert({
          name,
          phone,
          email:            document.getElementById('email').value.trim() || null,
          birthdate,
          municipality,
          wants_membership: true,
          join_date:        new Date().toISOString().slice(0, 10)
        });

        if (error) {
          alert('Noe gikk galt: ' + error.message);
        } else {
          await fetchCount();
          alert('Takk, ' + name + '! Registreringen din er mottatt.');
          this.reset();
        }

        btn.disabled    = false;
        btn.textContent = 'Bli medlem';
      });
    </script>
  </body>
</html>
